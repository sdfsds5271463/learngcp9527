apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-hello
  template:
    metadata:
      labels:
        app: go-hello
    spec:
      containers:
        - name: go-hello
          image: asia-east1-docker.pkg.dev/learngcp9527/my-repo/my-image:v1
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: go-hello
spec:
  selector:
    app: go-hello
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer